<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create HR Account — Unifina Group</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #000000 0%, #004B87 100%);
        }

        .login-box {
            background: #fff;
            padding: 48px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-logo {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #000;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .login-subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 32px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E0E0E0;
            font-size: 15px;
            outline: none;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus { border-color: #000; }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #000;
            color: #fff;
            border: 2px solid #000;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s ease;
            margin-top: 8px;
        }

        .login-btn:hover { background: transparent; color: #000; }

        .error-msg { color: #e74c3c; text-align: center; font-size: 14px; margin-top: 12px; display: none; }
        .success-msg { color: #2ECC71; text-align: center; font-size: 14px; margin-top: 12px; display: none; }

        .back-link { text-align: center; margin-top: 24px; font-size: 13px; }
        .back-link a { color: #000; text-decoration: none; font-weight: 600; }

        .admin-note {
            background: #FFF8E1;
            border-left: 3px solid #C9A84C;
            padding: 12px 16px;
            font-size: 12px;
            color: #555;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <div class="login-logo">UNIFINA GROUP</div>
            <div class="login-subtitle">Create HR Account</div>

            <div class="admin-note">
                This page is restricted to authorized personnel only. You need the admin code to create an HR account.
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="full_name" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="your@unifina.com.eg">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Admin Code</label>
                <input type="password" id="admin_code" placeholder="Enter admin code">
            </div>

            <button class="login-btn" onclick="handleSignup()">Create Account</button>
            <div class="error-msg" id="error-msg"></div>
            <div class="success-msg" id="success-msg">Account created successfully. Redirecting to login...</div>

            <div class="back-link">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000';

        async function handleSignup() {
            const full_name = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const admin_code = document.getElementById('admin_code').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!full_name || !email || !password || !admin_code) {
                errorMsg.textContent = 'Please fill in all fields';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API}/api/auth/signup?admin_code=${encodeURIComponent(admin_code)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name })
                });

                const data = await res.json();

                if (res.ok) {
                    successMsg.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    errorMsg.textContent = data.detail || 'Failed to create account';
                    errorMsg.style.display = 'block';
                }
            } catch(e) {
                errorMsg.textContent = 'Cannot connect to server';
                errorMsg.style.display = 'block';
            }
        }

        document.addEventListener('keypress', e => {
            if (e.key === 'Enter') handleSignup();
        });
    </script>
</body>
</html>
