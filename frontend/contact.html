<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Unifina Group</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .contact-page { padding: 80px 60px; max-width: 700px; margin: 0 auto; }
        .contact-page h1 { font-size: 36px; color: var(--primary); margin-bottom: 12px; }
        .contact-page p { color: var(--text-muted); margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px 16px;
            border: 2px solid #E5E7EB; border-radius: 8px;
            font-size: 15px; outline: none; font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); }
        .form-group textarea { height: 140px; resize: vertical; }
        .submit-btn {
            background: var(--primary); color: var(--white);
            padding: 14px 32px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 700; cursor: pointer;
        }
        .success-msg { color: #2ECC71; font-weight: 600; margin-top: 16px; display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">UNIFINA GROUP</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html" class="btn-login">Login</a></li>
        </ul>
    </nav>

    <div class="contact-page">
        <h1>Contact Us</h1>
        <p>Reach out to our team and we'll get back to you within 24 hours.</p>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Your full name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" id="phone" placeholder="+20 1XX XXX XXXX">
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea id="message" placeholder="How can we help you?"></textarea>
        </div>
        <button class="submit-btn" onclick="submitForm()">Send Message</button>
        <div class="success-msg" id="success-msg">✅ Message sent! We'll contact you shortly.</div>
    </div>

    <footer>
        <p>© 2025 Unifina Group. All rights reserved.</p>
    </footer>

    <script>
        const API = 'http://127.0.0.1:8000';
        async function submitForm() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const phone = document.getElementById('phone').value;

            if (!name || !email || !message) {
                alert('Please fill in all required fields');
                return;
            }

            const res = await fetch(`${API}/api/public/contact?name=${name}&email=${email}&message=${message}&phone=${phone}`, {
                method: 'POST'
            });

            if (res.ok) {
                document.getElementById('success-msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
